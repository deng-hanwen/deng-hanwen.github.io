          - "Authored clinical formulations and CPA reports for MDT care planning; delivered psychoeducation to healthcare professionals on neuropsychological approaches to challenging behaviour."
          - "Developed evidence-based Positive Behaviour Support (PBS) plans incorporating behavioural recordings and person-centred approaches."

