    Research Experience:
      - company: Yale University, Dr Sarah Yip
        position: Postgraduate Associate
        location: New Haven, CT
        start_date: 2026-01
        end_date: present
        summary: "Neurobiological Markers of Opioid Use Disorder"
        highlights:
          - "Analysed whole-brain functional connectivity in OUD (n=53) vs healthy controls (n=38) across MID reward and Stroop cognitive control tasks using Network-Based Statistics (NBS, 268-node Shen atlas); applied repeated-measures mixed-effects network analysis (NBR, R) and conjunction analysis to establish robustness of findings."
          - "Identified large-scale FC networks robustly differentiating OUD from healthy controls; demonstrated that group differences persist in resting-state FC, supporting a stable trait interpretation rather than task-driven artefact."
          - "Found that diagnostic FC networks do not predict treatment response, suggesting a dissociation between neural markers of OUD pathology and markers of recovery, consistent with previous addiction neuroscience literature."

      - company: Yale University & Rutgers University, Dr Sarah Yip & Dr Anna Konova
        position: Postgraduate Associate
        location: New Haven, CT
        start_date: 2025-12
        end_date: present
        summary: "Whole-Brain Resting-State fMRI Prediction of Ambiguity Tolerance"
        highlights:
          - "Applied connectome-based predictive modelling (CPM) to resting-state fMRI data (n=93) to predict individual differences in ambiguity tolerance derived from an economic decision-making task."
          - "Findings suggest that state-dependent processes underlying ambiguity tolerance may require task-based rather than resting-state connectivity paradigms, directly informing future study design."

      - company: UCL / Yale University
        position: MRes Dissertation (Distinction)
        location: London, UK
        start_date: 2024-09
        end_date: 2025-06
        summary: "Computational Markers and Clinical Vulnerability in Early Opioid Use Disorder Treatment"
        highlights:
          - "Fitted a utility-based computational model to a Risk and Ambiguity Decision-Making Task (n=15, 8-week dense-sampling design) to extract ambiguity tolerance and risk tolerance parameters; tested whether ambiguity tolerance predicted prospective opioid use via time-lagged mixed-effects logistic regression."
          - "Identified systematic non-random missingness (34.5% of sessions excluded); studied as a clinical signal and applied propensity score weighting to correct for exclusion bias."
          - "Mediation analysis identified distinct pathways from clinical vulnerability to data dropout: cognitive ability and positive affect were protective, while craving, sleep disturbance, and distress intolerance operated through active substance use."

      - company: UCL, Dr Liam Mason
        position: Voluntary Research Assistant
        location: London, UK
        start_date: 2024-05
        end_date: present
        summary: "Mood Velocity and Dynamics in Bipolar Disorder"
        highlights:
          - "Analysed longitudinal EMA data capturing mood fluctuations in bipolar disorder and healthy control cohorts across 8-week assessment periods."
          - "Applied continuous-time dynamical systems modelling, including Damped Linear Oscillator (DLO) modelling and Generalised Local Linear Approximation (GLLA), to characterise mood instability parameters."
          - "Co-authoring manuscript on mood velocity metrics as prospective indices of manic symptom intensification."

      - company: UCL, Dr Veronica Ranieri & Dr Rob Saunders
        position: Voluntary Research Assistant
        location: London, UK
        start_date: 2024-08
        end_date: 2025-03
        summary: "Cross-Country Analysis of Perceived Coercion During COVID-19"
        highlights:
          - "Led multilevel factor modelling and meta-analysis examining perceived coercion across 11 countries; investigated links with anxiety, depression, and emotion regulation."
          - "Identified significant cross-country variation in coercion scores, with perceived coercion consistently associated with elevated depression, anxiety, and stress symptoms."

