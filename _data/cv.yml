cv:
  name: Hanwen Deng
  label: Postgraduate Associate, Yale University
  email: hanwen.deng@yale.edu
  location: New Haven, CT
  image: ""
  summary: >
    Postgraduate researcher with over 4 years of hands-on experience across Yale University and
    University College London, specialising in computational psychiatry, affective neuroscience,
    and neuroimaging. Contributed to 2 publications, accepted for an oral presentation and 2 poster
    presentations at conferences. Skilled in R and MATLAB; experienced in computational modelling,
    ecological momentary assessment (EMA), and fMRI methods applied to mood disorders and addiction.
    Seeking to advance in a PhD programme in computational psychiatry or clinical neuroscience.

