      - title: "Discerning Individual Differences in Symptom Trajectories"
        authors:
          - Hanwen Deng
        date: 2025
        awarder: YPGA Symposium — IMPACT-MH
        summary: "Poster Presentation. IMPACT-MH (Individually Measured Phenotypes to Advance Computational Translation in Mental Health) is a large-scale longitudinal study across 16 clinics recruiting N=1,800 clinical and N=600 healthy control participants. Presented preliminary data (N=218; 58.3% female) showing high diagnostic complexity: 70% of participants carried multiple diagnoses spanning schizophrenia/psychosis, depression, PTSD, bipolar disorder, OCD, and substance use disorders. Longitudinal transdiagnostic design combining standardised clinical assessments with computational behavioural tasks and theory-driven modelling to characterise individual symptom trajectories and link intra-individual variability to underlying mechanisms."

